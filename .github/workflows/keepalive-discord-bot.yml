name: Keep Discord Bot Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot health endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" "https://hackstation-discord-bot.onrender.com/health" || echo "Ping failed"
