name: Build JavaFX Desktop App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: ./gradlew build
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-build
          path: desktop/build/libs/
