name: Build JavaFX Desktop App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            type: deb
            icon: HackStation-logo.png
            ext: .deb
            artifact: HackStation_1.0.0_amd64.deb
          - os: windows-latest
            type: msi
            icon: HackStation.ico
            ext: .msi
            artifact: HackStation-1.0.0.msi
          - os: macos-latest
            type: dmg
            icon: HackStation.icns
            ext: .dmg
            artifact: HackStation-1.0.0.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: 21
          java-package: jdk+fx

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        run: gradle jar
        working-directory: desktop

      - name: Generate macOS .icns from .iconset
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p /tmp/HackStation.iconset
          cp desktop/HackStation.iconset/*.png /tmp/HackStation.iconset/
          iconutil -c icns /tmp/HackStation.iconset -o desktop/HackStation.icns
        shell: bash

      - name: Build native installer
        run: |
          ICON_ARG=""
          [ -f "desktop/${{ matrix.icon }}" ] && ICON_ARG="--icon desktop/${{ matrix.icon }}"
          jpackage \
            --type ${{ matrix.type }} \
            --name HackStation \
            --app-version 1.0.0 \
            --vendor "Hackathon" \
            --input desktop/build/libs \
            --main-jar HackStation-1.0.0.jar \
            --main-class com.hackathon.App \
            --dest desktop/build/dist \
            --java-options "--add-modules=javafx.controls,javafx.fxml" \
            --description "Hackathon management platform" \
            --copyright "Copyright (c) 2026 Hackathon" \
            $ICON_ARG
        shell: bash

      - uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: HackStation-${{ matrix.os }}
          path: desktop/build/dist/*${{ matrix.ext }}

  release:
    if: github.event_name == 'release'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for dir in HackStation-*/; do
            for file in "$dir"*; do
              gh release upload "${{ github.event.release.tag_name }}" "$file" --clobber
            done
          done
